services:

  # ─────────────────────────────────────────────────────────────────────────
  # Base de datos PostgreSQL (Data Warehouse)
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sephora_db
    restart: unless-stopped

    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # API FastAPI
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: sephora_api
    restart: unless-stopped

    env_file: ../.env

    environment:
      POSTGRES_HOST: db
      # Raíz del proyecto dentro del contenedor (para que predict.py
      # encuentre models/ y data/processed/preprocessor.pkl)
      PROJECT_ROOT: /app

    ports:
      - "8000:8000"

    volumes:
      # Monta los modelos serializados de EP2 para POST /predict
      - ../models:/app/models:ro
      # Monta el preprocessor generado por EP2
      - ../data/processed:/app/data/processed:ro

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────────
  # Dashboard Streamlit
  # ─────────────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: sephora_dashboard
    restart: unless-stopped

    env_file: ../.env

    environment:
      API_BASE_URL: http://api:8000

    ports:
      - "8501:8501"

    depends_on:
      api:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
# Volúmenes nombrados
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
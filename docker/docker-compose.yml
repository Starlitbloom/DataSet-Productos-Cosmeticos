services:

  # ─────────────────────────────────────────────────────────────────────────
  # Base de datos PostgreSQL (Fuente 4 del ETL y Data Warehouse)
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sephora_db
    restart: unless-stopped

    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # API FastAPI
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: sephora_api
    restart: unless-stopped

    # El .env debe estar en la RAÍZ del proyecto (un nivel arriba de docker/).
    # Si tienes el .env dentro de docker/, muévelo a la raíz con:
    #   mv docker/.env .env
    env_file: ../.env

    environment:
      # Sobreescribir host para que apunte al contenedor db, no a localhost
      POSTGRES_HOST: db

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      # curl está instalado en el Dockerfile.api para que esto funcione
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 10s
      retries: 5
      # Aumentado a 40s: uvicorn necesita tiempo para arrancar en el contenedor
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────────
  # Dashboard Streamlit
  # ─────────────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: sephora_dashboard
    restart: unless-stopped

    env_file: ../.env

    environment:
      # La API corre en el contenedor 'api', no en localhost
      API_BASE_URL: http://api:8000

    ports:
      - "8501:8501"

    depends_on:
      api:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
# Volúmenes nombrados
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local